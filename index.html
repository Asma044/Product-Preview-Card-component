<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="utf-8">
        <title>Product-Preview-Card-component</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <div class="container">
                <div class="img">
                    <img src="image-product-desktop.jpg" alt="">
                </div>
                <div class="card">
                    <p class="perfume">PERFUME</p>
                    <h1 class="expression">Gabrielle Essence Eau De Parfum</h1>
                    <p class="description">A floral, solar and voluptuous inerpretation composed by Oliver Polge, Perfumer-Creator for the House of CHANEL.</p>
                    <div class="price">
                        <p class="discount">$149.99</p>
                        <p class="amount">$169.99</p>
                    </div>
                    
                    <button type="button" class="button"><img src="icon-cart.svg" alt="">  Add to Cart</button>
            
                </div>
            </div>
    </main>
    </body>
</html>
